<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Happy Birthday ❤️</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>
<body class="final-page">

<div class="final-container">

  <h1 class="birthday-title">
    Happy Birthday ❤️
  </h1>

  <p class="birthday-message">
    Out of all the beautiful things life has given me...
meeting you is my favorite ❤️


    <br><br>
    Thank you for existing.
  </p>

  <div class="single-photo">
    <img src="5.jpg">
    <p style="color:#333;margin-top:12px;font-weight:600;">
        My Favorite Person ❤️
    </p>
</div>
<audio autoplay loop>
  <source src="music.mp3" type="audio/mp3">
</audio>
  <button class="secret-btn" onclick="showSecret()">
    One Last Thing ❤️
  </button>

  <div id="secret-message">
    I hope this birthday becomes one of your happiest memories ✨
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
